<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Array</title>
</head>
<body>
    <!--aula de arrow function e setInterval-->
    <div id="caixa"></div>
<style>
    body{
        background-color: black;
    }
    #caixa{
        width: 50px;
        height: 50px;
        background-color: blueviolet;
        position: absolute;
        left: 0px;
        top: 0px;
    }
</style>
<script>
    let caixa = document.getElementById('caixa');
    let x = 0;
    let y = 100;
    let direcao = "";
    document.addEventListener("keydown", (e) => {// Captura Tecla
        direcao = e.key;

    });
    setInterval(() => {
        switch(direcao){
            case"ArrowRight": x+=5; break;
            case"ArrowLeft": x-=5; break;
            case"ArrowUp": y-=5; break;
            case"ArrowDown": y+=5; break;
        }
        caixa.style.left = x + "px";
        caixa.style.top = y + "px";
    },10);
</script>

</body>
</html>
